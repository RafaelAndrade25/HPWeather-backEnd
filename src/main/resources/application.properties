spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=hpTap
spring.datasource.username=postgres
spring.datasource.password=12345678

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=hpTap

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.web.error.include-message=always

api.security.token.secret=${JWT_SECRET:my-secret-key}

jwt.secret=${helpTapSecretKeyForJwtTokenGenerationAndValidation2024ThisMustBe512BitsLongForHS512Algorithm}

jwt.expiration=86400000

encryption.secret=helpTapEncryptionKey2024ForSensitiveHealthData